<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC250 Toolkit — Submit a Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #12122a;
      border-bottom: 2px solid #e44d26;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.4rem; color: #fff; }
    header h1 span { color: #e44d26; }
    header p { font-size: 0.82rem; color: #888; margin-top: 3px; }

    .lang-bar {
      background: #12122a;
      padding: 8px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid #222244;
    }
    .lang-bar button {
      background: none;
      border: 1px solid #333366;
      color: #aaa;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .lang-bar button:hover, .lang-bar button.active {
      background: #e44d26;
      border-color: #e44d26;
      color: #fff;
    }

    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 32px auto;
      padding: 0 16px 40px;
    }

    .intro {
      background: #12122a;
      border: 1px solid #222244;
      border-left: 3px solid #e44d26;
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .intro a { color: #e44d26; text-decoration: none; }
    .intro a:hover { text-decoration: underline; }

    /* Guidelines box */
    .guidelines {
      background: rgba(255, 160, 0, 0.06);
      border: 1px solid rgba(255, 160, 0, 0.3);
      border-left: 3px solid #ffa000;
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin-bottom: 28px;
    }
    .guidelines-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: #ffa000;
      margin-bottom: 10px;
    }
    .guidelines ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .guidelines li {
      font-size: 0.85rem;
      line-height: 1.5;
      color: #ccc;
      padding-left: 18px;
      position: relative;
    }
    .guidelines li::before {
      content: attr(data-bullet);
      position: absolute;
      left: 0;
      color: #ffa000;
      font-weight: 700;
    }
    .guidelines li strong { color: #ffa000; }
    .guidelines li code {
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.82rem;
      color: #e0e0e0;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    form { display: flex; flex-direction: column; gap: 22px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #ccc;
    }
    label .req { color: #e44d26; margin-left: 2px; }

    .hint {
      font-size: 0.78rem;
      color: #888;
      line-height: 1.5;
    }
    .hint a { color: #e44d26; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .hint-warn {
      font-size: 0.78rem;
      color: #ffa000;
      line-height: 1.5;
      margin-top: 3px;
    }
    .hint-warn code {
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 0.78rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    input[type="text"], textarea, select {
      background: #12122a;
      border: 1px solid #333366;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      width: 100%;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #e44d26;
    }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #12122a; }

    .field.invalid input, .field.invalid textarea, .field.invalid select {
      border-color: #ff6b6b;
    }
    .field.warn input, .field.warn textarea {
      border-color: #ffa000;
    }

    .error {
      font-size: 0.82rem;
      color: #ff6b6b;
      display: none;
      padding-left: 2px;
    }
    .field.invalid .error { display: block; }

    .field-warn-msg {
      font-size: 0.82rem;
      color: #ffa000;
      display: none;
      padding-left: 2px;
    }
    .field.warn .field-warn-msg { display: block; }

    .submit-btn {
      background: #e44d26;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      align-self: flex-start;
      margin-top: 6px;
    }
    .submit-btn:hover { background: #c43a1c; }
    .submit-btn:active { transform: scale(0.98); }

    .submit-note {
      font-size: 0.8rem;
      color: #666;
      margin-top: 10px;
      line-height: 1.5;
    }
    .submit-note a { color: #e44d26; text-decoration: none; }

    footer {
      background: #0a0a15;
      border-top: 1px solid #222244;
      padding: 16px 24px;
      text-align: center;
      font-size: 0.82rem;
      color: #555;
    }
    footer a { color: #e44d26; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>BC250 <span>Toolkit</span></h1>
    <p>ASRock BC-250 · Cyan Skillfish · Bazzite / SteamOS</p>
  </div>
</header>

<div class="lang-bar" id="langBar"></div>

<main>
  <div class="intro" id="introText"></div>

  <!-- Guidelines -->
  <div class="guidelines">
    <div class="guidelines-title" id="guideTitle"></div>
    <ul id="guideList"></ul>
  </div>

  <form id="gameForm" novalidate>

    <!-- Catalog search (helper, optional) -->
    <div class="field" id="f-catalog">
      <label for="gameSearch"><span data-i18n="label_catalog"></span></label>
      <input type="text" id="gameSearch" list="gameCatalog" autocomplete="off" placeholder="Counter-Strike, Elden Ring…" />
      <datalist id="gameCatalog"></datalist>
      <div class="hint" data-i18n="hint_catalog"></div>
    </div>

    <!-- Game Name -->
    <div class="field" id="f-name">
      <label for="gameName"><span data-i18n="label_name"></span><span class="req">*</span></label>
      <input type="text" id="gameName" autocomplete="off" />
      <div class="error" data-i18n="err_required"></div>
    </div>

    <!-- App ID -->
    <div class="field" id="f-appid">
      <label for="appId"><span data-i18n="label_appid"></span><span class="req">*</span></label>
      <input type="text" id="appId" autocomplete="off" inputmode="numeric" placeholder="ex: 1245620" />
      <div class="hint"><span data-i18n="hint_appid"></span> — <a href="https://www.steamdb.info/" target="_blank" rel="noopener">SteamDB</a> / store.steampowered.com/app/<strong>XXXXXX</strong>/</div>
      <div class="hint-warn" data-i18n="hintwarn_appid"></div>
      <div class="error" id="appIdError"></div>
    </div>

    <!-- Proton -->
    <div class="field" id="f-proton">
      <label for="proton"><span data-i18n="label_proton"></span><span class="req">*</span></label>
      <select id="proton">
        <option value="GE-Proton (latest)">GE-Proton (latest)</option>
        <option value="Proton Experimental">Proton Experimental</option>
        <option value="Proton Stable">Proton Stable</option>
        <option value="Other (specify in notes)">Other (specify in notes)</option>
      </select>
      <div class="hint" data-i18n="hint_proton"></div>
    </div>

    <!-- Compat Tool -->
    <div class="field" id="f-compat">
      <label for="compatTool"><span data-i18n="label_compat"></span></label>
      <input type="text" id="compatTool" placeholder="proton_ge / proton_experimental / proton_stable" autocomplete="off" />
      <div class="hint" data-i18n="hint_compat"></div>
    </div>

    <!-- Launch Options -->
    <div class="field" id="f-launch">
      <label for="launchOpts"><span data-i18n="label_launch"></span></label>
      <textarea id="launchOpts" rows="3" placeholder="MANGOHUD=1 MANGOHUD_CONFIG=no_display ENABLE_VKBASALT=1 gamemoderun %command%"></textarea>
      <div class="hint" data-i18n="hint_launch"></div>
      <div class="hint-warn" data-i18n="hintwarn_launch"></div>
      <div class="field-warn-msg" id="launchWarnMsg"></div>
    </div>

    <!-- Notes -->
    <div class="field" id="f-notes">
      <label for="notes"><span data-i18n="label_notes"></span><span class="req">*</span></label>
      <textarea id="notes" rows="5"></textarea>
      <div class="hint" data-i18n="hint_notes"></div>
      <div class="hint-warn" data-i18n="hintwarn_notes"></div>
      <div class="error" id="notesError"></div>
    </div>

    <!-- Tested By -->
    <div class="field" id="f-tested">
      <label for="testedBy"><span data-i18n="label_tested"></span></label>
      <input type="text" id="testedBy" autocomplete="off" />
      <div class="hint" data-i18n="hint_tested"></div>
    </div>

    <div>
      <button type="submit" class="submit-btn" data-i18n="btn_submit"></button>
      <div class="submit-note" data-i18n="submit_note"></div>
    </div>

  </form>
</main>

<footer>
  <a href="https://github.com/Necrosiak/bc250-toolkit-decky" target="_blank" rel="noopener">BC250 Toolkit on GitHub</a>
  &nbsp;·&nbsp;
  <a href="https://github.com/Necrosiak/bc250-toolkit-decky/blob/main/README.md" target="_blank" rel="noopener" data-i18n="footer_db"></a>
  &nbsp;·&nbsp;
  <a href="https://elektricm.github.io/amd-bc250-docs" target="_blank" rel="noopener">BC-250 Docs</a>
</footer>

const LANG_LABELS = {
  en: "EN 🇬🇧", fr: "FR 🇫🇷", de: "DE 🇩🇪", es: "ES 🇪🇸",
  it: "IT 🇮🇹", pt: "PT 🇵🇹", nl: "NL 🇳🇱", pl: "PL 🇵🇱", ru: "RU 🇷🇺",
};

/* Variables already set globally by bc250-tweaks — warn if present in launch options */
const ALREADY_SET = [
  'RADV_DEBUG=nohiz',
  'DXVK_LOG_LEVEL=none',
  'VKD3D_DEBUG=none',
  'WINE_FULLSCREEN_FSR=1',
  'WINEDEBUG=-all',
];

/* Strings that indicate overly generic notes */
const GENERIC_NOTES = ['works', 'fonctionne', 'ça marche', 'ok', 'good', 'runs fine', 'runs', 'fine', 'fun', 'jouable'];

let currentLang = "en";

function detectLang() {
  const nav = (navigator.language || "en").toLowerCase().slice(0, 2);
  return I18N[nav] ? nav : "en";
}

function applyLang(lang) {
  currentLang = lang;
  const t = I18N[lang];
  document.title = t.page_title;
  document.documentElement.lang = lang;
  document.getElementById("introText").innerHTML = t.intro;

  // Guidelines
  document.getElementById("guideTitle").textContent = t.guide_title;
  const ul = document.getElementById("guideList");
  ul.innerHTML = "";
  t.guides.forEach(g => {
    const li = document.createElement("li");
    li.setAttribute("data-bullet", g.bullet);
    li.innerHTML = g.text;
    ul.appendChild(li);
  });

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  document.querySelectorAll("#langBar button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });
}

function buildLangBar() {
  const bar = document.getElementById("langBar");
  Object.entries(LANG_LABELS).forEach(([code, label]) => {
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.dataset.lang = code;
    btn.onclick = () => applyLang(code);
    bar.appendChild(btn);
  });
}

function clearState(fieldId) {
  const f = document.getElementById(fieldId);
  f.classList.remove("invalid", "warn");
}

function setError(fieldId, msg) {
  const f = document.getElementById(fieldId);
  f.classList.remove("warn");
  f.classList.add("invalid");
  const err = f.querySelector(".error");
  if (err && msg) err.textContent = msg;
}

function setWarn(fieldId, msg) {
  const f = document.getElementById(fieldId);
  if (f.classList.contains("invalid")) return; // error takes priority
  f.classList.add("warn");
  const warnEl = f.querySelector(".field-warn-msg");
  if (warnEl && msg) warnEl.textContent = msg;
}

function validate() {
  const t = I18N[currentLang];
  let ok = true;

  // Clear all states
  ["f-name", "f-appid", "f-proton", "f-launch", "f-notes"].forEach(clearState);

  // Game name
  if (!document.getElementById("gameName").value.trim()) {
    setError("f-name", t.err_required);
    ok = false;
  }

  // App ID
  const appIdVal = document.getElementById("appId").value.trim();
  if (!appIdVal) {
    setError("f-appid", t.err_required);
    ok = false;
  } else if (appIdVal.includes("steamcommunity") || appIdVal.includes("store.steampowered") || appIdVal.includes("steamdb") || appIdVal.includes("/")) {
    setError("f-appid", t.err_appid_url);
    ok = false;
  } else if (!/^\d+$/.test(appIdVal)) {
    setError("f-appid", t.err_appid_num);
    ok = false;
  }

  // Launch options — warn if %command% missing (not blocking if field is empty)
  const launchVal = document.getElementById("launchOpts").value.trim();
  if (launchVal && !launchVal.includes("%command%")) {
    setWarn("f-launch", t.warn_no_cmd);
    // Not blocking — user can intentionally omit, but warn
  }
  // Warn if known-already-set vars are present
  if (launchVal) {
    const found = ALREADY_SET.filter(v => launchVal.includes(v));
    if (found.length > 0) {
      const msg = t.warn_already_set + " " + found.map(v => v).join(", ");
      setWarn("f-launch", msg);
    }
  }

  // Notes
  const notesVal = document.getElementById("notes").value.trim();
  if (!notesVal) {
    setError("f-notes", t.err_required);
    ok = false;
  } else if (notesVal.length < 15) {
    setError("f-notes", t.err_notes_short);
    ok = false;
  } else {
    const lower = notesVal.toLowerCase();
    const isGeneric = GENERIC_NOTES.some(w => lower === w || lower === w + "." || lower === w + "!");
    if (isGeneric) {
      setError("f-notes", t.err_notes_generic);
      ok = false;
    }
  }

  return ok;
}

document.getElementById("gameForm").addEventListener("submit", function(e) {
  e.preventDefault();
  if (!validate()) {
    // Scroll to first error
    const firstInvalid = document.querySelector(".field.invalid");
    if (firstInvalid) firstInvalid.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  const gameName   = document.getElementById("gameName").value.trim();
  const appId      = document.getElementById("appId").value.trim();
  const proton     = document.getElementById("proton").value;
  const compatTool = document.getElementById("compatTool").value.trim();
  const launchOpts = document.getElementById("launchOpts").value.trim();
  const notes      = document.getElementById("notes").value.trim();
  const testedBy   = document.getElementById("testedBy").value.trim();

  const body = [
    `### Game Name\n\n${gameName}`,
    `### Steam App ID\n\n${appId}`,
    `### Proton Version\n\n${proton}`,
    `### Compat Tool ID (optional)\n\n${compatTool || "_none_"}`,
    `### Launch Options\n\n${launchOpts || "_none_"}`,
    `### Notes\n\n${notes}`,
    `### Tested By\n\n${testedBy || "_anonymous_"}`,
  ].join("\n\n");

  const title = encodeURIComponent(`[Game] ${gameName}`);
  const bodyEnc = encodeURIComponent(body);
  const url = `https://github.com/Necrosiak/bc250-toolkit-decky/issues/new?template=game_request.yml&title=${title}&body=${bodyEnc}`;
  window.open(url, "_blank", "noopener");
});

// Clear error/warn on input
["gameName", "appId", "launchOpts", "notes"].forEach(id => {
  document.getElementById(id).addEventListener("input", function() {
    const fieldMap = { gameName: "f-name", appId: "f-appid", launchOpts: "f-launch", notes: "f-notes" };
    clearState(fieldMap[id]);
  });
});

/* ── Game catalog (top 2000 most-played, from games_catalog.json) ── */
const CATALOG_URL = "https://raw.githubusercontent.com/Necrosiak/bc250-toolkit-decky/main/games_catalog.json";
let CATALOG = [];
let CATALOG_BY_NAME = new Map();

async function loadCatalog() {
  try {
    const r = await fetch(CATALOG_URL, { cache: "no-store" });
    if (!r.ok) return;
    const data = await r.json();
    CATALOG = Array.isArray(data.games) ? data.games : [];
    CATALOG_BY_NAME = new Map(CATALOG.map(g => [g.name.toLowerCase(), String(g.appid)]));
  } catch (e) { /* offline / blocked → manual entry still works */ }
}

function refreshCatalogOptions(query) {
  const dl = document.getElementById("gameCatalog");
  const q = query.trim().toLowerCase();
  if (q.length < 2 || !CATALOG.length) { dl.innerHTML = ""; return; }
  const matches = [];
  for (const g of CATALOG) {
    if (g.name.toLowerCase().includes(q)) {
      matches.push(g);
      if (matches.length >= 50) break;
    }
  }
  dl.innerHTML = matches
    .map(g => `<option value="${g.name.replace(/"/g, "&quot;")}">#${g.appid}</option>`)
    .join("");
}

function applyCatalogSelection(value) {
  const appid = CATALOG_BY_NAME.get(value.trim().toLowerCase());
  if (appid) {
    document.getElementById("gameName").value = value.trim();
    document.getElementById("appId").value = appid;
    clearState("f-name");
    clearState("f-appid");
  }
}

const gameSearch = document.getElementById("gameSearch");
gameSearch.addEventListener("input", function () {
  refreshCatalogOptions(this.value);
  applyCatalogSelection(this.value); // fires when a datalist option is clicked
});
gameSearch.addEventListener("change", function () { applyCatalogSelection(this.value); });
loadCatalog();

buildLangBar();
applyLang(detectLang());
</script>
